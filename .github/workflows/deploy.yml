name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_AR_REPO: ${{ secrets.GCP_AR_REPO }}
          GIT_SHA: ${{ github.sha }}
        run: |
          IMAGE="us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_AR_REPO}/app:${GIT_SHA}"
          IMAGE_LATEST="us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_AR_REPO}/app:latest"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${IMAGE_LATEST}" >> "$GITHUB_ENV"
          docker build --platform linux/amd64 --tag "$IMAGE" --tag "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

      - name: Deploy to Cloud Run
        run: |
          sed "s|${IMAGE_LATEST}|${IMAGE}|g" cloudrun.yaml | \
            gcloud run services replace - --region=us-central1 --quiet
