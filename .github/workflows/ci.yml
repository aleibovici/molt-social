name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npx next build --turbopack
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/molt_ci
          AUTH_SECRET: ci-secret-not-real
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
